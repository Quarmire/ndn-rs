; NFD testbed configuration (NFD 24.07)

general
{
  ; No user/group drop in Docker — container already runs isolated.
}

log
{
  default_level INFO
}

forwarder
{
  default_hop_limit 0
}

tables
{
  cs_max_packets 65536
  cs_policy lru
  cs_unsolicited_policy drop-all

  strategy_choice
  {
    /               /localhost/nfd/strategy/best-route
    /localhost      /localhost/nfd/strategy/multicast
    /localhost/nfd  /localhost/nfd/strategy/best-route
    /ndn/broadcast  /localhost/nfd/strategy/multicast
  }
}

face_system
{
  unix
  {
    ; Must match the compiled-in default used by ndn-cxx clients (nfdc, etc.)
    path /run/nfd/nfd.sock
  }

  tcp
  {
    listen    yes
    port      6363
    enable_v4 yes
    enable_v6 no
  }

  udp
  {
    listen    yes
    port      6363
    enable_v4 yes
    enable_v6 no
    mcast     no
  }
}

authorizations
{
  authorize
  {
    certfile any
    privileges
    {
      faces
      fib
      cs
      strategy-choice
    }
  }
}

rib
{
  ; Allow anyone to register routes in local RIB (testbed only).
  localhost_security
  {
    trust-anchor
    {
      type any
    }
  }

  prefix_announcement_validation
  {
    trust-anchor
    {
      type any
    }
  }

  readvertise_nlsr no
}
