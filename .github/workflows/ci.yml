name: CI — core

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - "crates/ndn-tlv/**"
      - "crates/ndn-packet/**"
      - "crates/ndn-transport/**"
      - "crates/ndn-store/**"
      - "crates/ndn-face-net/**"
      - "crates/ndn-face-local/**"
      - "crates/ndn-face-serial/**"
      - "crates/ndn-pipeline/**"
      - "crates/ndn-strategy/**"
      - "crates/ndn-security/**"
      - "crates/ndn-engine/**"
      - "crates/ndn-app/**"
      - "crates/ndn-ipc/**"
      - "crates/ndn-config/**"
      - "crates/ndn-discovery/**"
      - "crates/ndn-sync/**"
      - "crates/ndn-sim/**"
      - "crates/ndn-wasm/**"
      - "binaries/**"
      - "examples/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci.yml"
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "crates/ndn-tlv/**"
      - "crates/ndn-packet/**"
      - "crates/ndn-transport/**"
      - "crates/ndn-store/**"
      - "crates/ndn-face-net/**"
      - "crates/ndn-face-local/**"
      - "crates/ndn-face-serial/**"
      - "crates/ndn-pipeline/**"
      - "crates/ndn-strategy/**"
      - "crates/ndn-security/**"
      - "crates/ndn-engine/**"
      - "crates/ndn-app/**"
      - "crates/ndn-ipc/**"
      - "crates/ndn-config/**"
      - "crates/ndn-discovery/**"
      - "crates/ndn-sync/**"
      - "crates/ndn-sim/**"
      - "crates/ndn-wasm/**"
      - "binaries/**"
      - "examples/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  core:
    name: Core (fmt / clippy / test / doc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-core-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-core-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: >
          cargo clippy
          --workspace
          --exclude ndn-face-l2
          --exclude ndn-strategy-wasm
          --exclude ndn-research
          --exclude ndn-compute
          --exclude ndn-python
          -- -D warnings

      - name: Test
        run: >
          cargo test
          --workspace
          --exclude ndn-face-l2
          --exclude ndn-strategy-wasm
          --exclude ndn-research
          --exclude ndn-compute
          --exclude ndn-python

      - name: Doc build
        run: >
          cargo doc
          --workspace
          --exclude ndn-face-l2
          --exclude ndn-strategy-wasm
          --exclude ndn-research
          --exclude ndn-compute
          --exclude ndn-python
          --no-deps
