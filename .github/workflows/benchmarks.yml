name: benchmarks

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bench:
    name: Run benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: bench-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run ndn-packet benchmarks
        run: cargo bench -p ndn-packet --bench name -- --output-format bencher 2>/dev/null | tee bench-packet.txt

      - name: Run ndn-store benchmarks (LRU + Sharded)
        run: cargo bench -p ndn-store --bench lru --bench sharded -- --output-format bencher 2>/dev/null | tee bench-store.txt

      - name: Run ndn-engine benchmarks
        run: cargo bench -p ndn-engine --bench pipeline -- --output-format bencher 2>/dev/null | tee bench-engine.txt

      - name: Run ndn-face-local benchmarks
        run: cargo bench -p ndn-face-local --bench face_local -- --output-format bencher 2>/dev/null | tee bench-face.txt

      - name: Run ndn-security benchmarks
        run: cargo bench -p ndn-security --bench security -- --output-format bencher 2>/dev/null | tee bench-security.txt

      - name: Pull latest main before applying bench table
        # Pull *before* the python script writes pipeline-benchmarks.md so
        # we always rewrite the file against the freshest upstream content.
        # The bench-*.txt files (criterion output, one per crate) are
        # outside git and survive a fast-forward pull, so the table data
        # itself is preserved. This avoids the rebase merge-conflict that
        # used to bite us when two benchmark runs touched the same lines
        # in the BENCH_RESULTS_START..END block.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --hard origin/main

      - name: Update wiki benchmark page
        run: |
          python3 - <<'PYEOF'
          import re, datetime, pathlib

          # Parse bencher format: "test <name> ... bench: <n> ns/iter (+/- <v>)"
          results = []
          for f in sorted(pathlib.Path('.').glob('bench-*.txt')):
              for line in f.read_text().splitlines():
                  m = re.match(
                      r'test\s+(\S+)\s+\.\.\.\s+bench:\s+([\d,]+)\s+ns/iter\s+\(\+/-\s+([\d,]+)\)',
                      line.strip()
                  )
                  if m:
                      name = m.group(1)
                      ns   = int(m.group(2).replace(',', ''))
                      var  = int(m.group(3).replace(',', ''))
                      results.append((name, ns, var))

          if not results:
              print("No benchmark results found — skipping wiki update")
              exit(0)

          # Build markdown table, grouping by prefix (first path component)
          def fmt_ns(n):
              if n >= 1_000_000:
                  return f"{n/1_000_000:.2f} ms"
              if n >= 1_000:
                  return f"{n/1_000:.2f} µs"
              return f"{n} ns"

          def group_key(name):
              return name.split('/')[0] if '/' in name else 'other'

          from itertools import groupby
          results.sort(key=lambda r: (group_key(r[0]), r[0]))

          lines = []
          lines.append(f"*Last updated by CI on {datetime.date.today().isoformat()} (ubuntu-latest, stable Rust)*\n")

          prev_group = None
          lines.append("| Benchmark | Median | ± Variance |")
          lines.append("|-----------|--------|------------|")
          for name, ns, var in results:
              g = group_key(name)
              if g != prev_group:
                  if prev_group is not None:
                      lines.append(f"| | | |")
                  prev_group = g
              lines.append(f"| `{name}` | {fmt_ns(ns)} | ±{fmt_ns(var)} |")

          table = '\n'.join(lines)

          wiki_path = pathlib.Path('docs/wiki/src/benchmarks/pipeline-benchmarks.md')
          content = wiki_path.read_text()
          new_content = re.sub(
              r'<!-- BENCH_RESULTS_START -->.*?<!-- BENCH_RESULTS_END -->',
              f'<!-- BENCH_RESULTS_START -->\n{table}\n<!-- BENCH_RESULTS_END -->',
              content,
              flags=re.DOTALL
          )
          wiki_path.write_text(new_content)
          print(f"Updated {wiki_path} with {len(results)} benchmark results")
          PYEOF

      - name: Commit updated wiki page
        # Push with retries so a race with a concurrent bench run resolves
        # by re-applying the table on top of the latest upstream rather
        # than failing the job. Each retry re-pulls main, re-runs nothing
        # (the python step already wrote the table relative to the
        # earlier pull), regenerates the table once more from the same
        # bench-*.txt files (idempotent), and tries to push again.
        run: |
          git add docs/wiki/src/benchmarks/pipeline-benchmarks.md
          if git diff --cached --quiet; then
            echo "No changes to benchmark results"
            exit 0
          fi
          git commit -m "chore: update benchmark results [skip ci]"

          for attempt in 1 2 3; do
            if git push origin main; then
              echo "Pushed bench results (attempt $attempt)."
              exit 0
            fi
            echo "Push rejected on attempt $attempt — re-syncing and retrying."
            # Reset to upstream, then re-apply the table from the same
            # bench-*.txt files. Idempotent: produces the same wiki diff
            # against whatever main happens to look like now.
            git fetch origin main
            git reset --hard origin/main
            python3 - <<'PYEOF'
          import re, datetime, pathlib
          results = []
          for f in sorted(pathlib.Path('.').glob('bench-*.txt')):
              for line in f.read_text().splitlines():
                  m = re.match(
                      r'test\s+(\S+)\s+\.\.\.\s+bench:\s+([\d,]+)\s+ns/iter\s+\(\+/-\s+([\d,]+)\)',
                      line.strip()
                  )
                  if m:
                      results.append((m.group(1),
                                      int(m.group(2).replace(',', '')),
                                      int(m.group(3).replace(',', ''))))
          if not results:
              exit(0)
          def fmt_ns(n):
              if n >= 1_000_000: return f"{n/1_000_000:.2f} ms"
              if n >= 1_000:     return f"{n/1_000:.2f} µs"
              return f"{n} ns"
          def group_key(name):
              return name.split('/')[0] if '/' in name else 'other'
          results.sort(key=lambda r: (group_key(r[0]), r[0]))
          lines = [f"*Last updated by CI on {datetime.date.today().isoformat()} (ubuntu-latest, stable Rust)*\n",
                   "| Benchmark | Median | ± Variance |",
                   "|-----------|--------|------------|"]
          prev = None
          for name, ns, var in results:
              g = group_key(name)
              if g != prev:
                  if prev is not None: lines.append("| | | |")
                  prev = g
              lines.append(f"| `{name}` | {fmt_ns(ns)} | ±{fmt_ns(var)} |")
          table = '\n'.join(lines)
          wiki = pathlib.Path('docs/wiki/src/benchmarks/pipeline-benchmarks.md')
          wiki.write_text(re.sub(
              r'<!-- BENCH_RESULTS_START -->.*?<!-- BENCH_RESULTS_END -->',
              f'<!-- BENCH_RESULTS_START -->\n{table}\n<!-- BENCH_RESULTS_END -->',
              wiki.read_text(),
              flags=re.DOTALL,
          ))
          PYEOF
            git add docs/wiki/src/benchmarks/pipeline-benchmarks.md
            if git diff --cached --quiet; then
              echo "Re-synced upstream already had the same content; nothing to push."
              exit 0
            fi
            git commit -m "chore: update benchmark results [skip ci]"
          done

          echo "Push failed after 3 attempts." >&2
          exit 1
