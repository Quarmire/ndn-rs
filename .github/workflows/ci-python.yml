name: CI — python

on:
  push:
    branches: [main]
    paths:
      - "bindings/ndn-python/**"
      - "Cargo.lock"
      - ".github/workflows/ci-python.yml"
  pull_request:
    branches: [main]
    paths:
      - "bindings/ndn-python/**"
      - "Cargo.lock"
      - ".github/workflows/ci-python.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  python:
    name: Python bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-python-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-python-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install maturin
        run: pip install maturin

      - name: Lint
        run: cargo clippy -p ndn-python -- -D warnings

      - name: Build wheel
        run: maturin build -m bindings/ndn-python/Cargo.toml

      - name: Doc build
        run: cargo doc -p ndn-python --no-deps
