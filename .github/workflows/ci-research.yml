name: CI — research

on:
  push:
    branches: [main]
    paths:
      - "crates/ndn-strategy-wasm/**"
      - "crates/ndn-research/**"
      - "crates/ndn-compute/**"
      - "examples/wasm-strategy/**"
      - "Cargo.lock"
      - ".github/workflows/ci-research.yml"
  pull_request:
    branches: [main]
    paths:
      - "crates/ndn-strategy-wasm/**"
      - "crates/ndn-research/**"
      - "crates/ndn-compute/**"
      - "examples/wasm-strategy/**"
      - "Cargo.lock"
      - ".github/workflows/ci-research.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  research:
    name: Research extensions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-research-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-research-

      - name: Lint
        run: >
          cargo clippy
          -p ndn-strategy-wasm
          -p ndn-research
          -p ndn-compute
          -- -D warnings

      - name: Test
        run: >
          cargo test
          -p ndn-strategy-wasm
          -p ndn-research
          -p ndn-compute

      - name: Doc build
        run: >
          cargo doc
          -p ndn-strategy-wasm
          -p ndn-research
          -p ndn-compute
          --no-deps
